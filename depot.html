<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Relance - Espace Dépôt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-brand">
            <img src="images\logo relance V0.jpg" alt="Logo La Relance" class="logo-header">
            <span>La Relance</span>
        </div>
        
        <nav class="nav-links">
            <ul>
                <li><a href="index.html">Qui sommes-nous ?</a></li>
                <li><a href="communaute.html">Le Mouvement</a></li>
                <li><a href="depot.html">Déposer du contenu</a></li>
                <li><a href="calendrier.html">Calendrier</a></li>
                <li><a href="galerie.html">Galerie Vidéos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Espace Relanceurs : Dépose ton contenu</h2>
            <p>Balance tes photos ou tes rushs vidéos ici. Remplis bien les infos pour qu'on puisse te créditer sur les réseaux !</p>
            
            <form action="/serveur-de-traitement" method="POST" enctype="multipart/form-data">
                
                <div>
                    <label for="fichiers-upload"><strong>Sélectionne tes fichiers :</strong></label><br>
                    <input type="file" id="fichiers-upload" name="fichiers" accept="image/*,video/*" multiple required>
                </div>
                <br>

                <div>
                    <label for="contexte"><strong>Où et quand ? (Contexte, blague, etc.) :</strong></label><br>
                    <textarea id="contexte" name="contexte" rows="4" cols="50"></textarea>
                </div>
                <br>

                <div>
                    <label for="credits"><strong>Ton pseudo Insta/Strava :</strong></label><br>
                    <input type="text" id="credits" name="credits" required>
                </div>
                <br>

                <button type="submit">Envoyer aux monteurs</button>

            </form>
        </section>
    </main>

    <footer>
        <hr>
        <p>&copy; 2026 La Relance - Besançon</p>
    </footer>

</body>
</html>
